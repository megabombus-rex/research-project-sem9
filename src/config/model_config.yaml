models:
  vit-with-tokenizer:
    image-model: "google/vit-base-patch16-224"
    tokenizer-model: "bert-base-uncased"
  vit-model-tabular:
    image-model: "google/vit-base-patch16-224"
    tab-model:
        embed_dim: 64
        depth: 3
        num_heads: 4
        dropout: 0.1
        lr: 0.0001